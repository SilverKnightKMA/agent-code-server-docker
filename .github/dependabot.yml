version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-minor-patch:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
        patterns:
          - "*"
