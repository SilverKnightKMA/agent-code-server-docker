name: Baked Tools Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile*
      - scripts/**
      - managed-tools/baked-tools.json
      - bootstrap.sh
      - package.json
      - package-lock.json
      - bun.lock
      - go.mod
      - go.sum
      - tools.go
      - .github/workflows/baked-tools-check.yml
      - .tmux.conf
      - .github/workflows/baked-tools-monitor.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile*
      - scripts/**
      - managed-tools/baked-tools.json
      - bootstrap.sh
      - package.json
      - package-lock.json
      - bun.lock
      - go.mod
      - go.sum
      - tools.go
      - .github/workflows/baked-tools-check.yml
      - .tmux.conf
      - .github/workflows/baked-tools-monitor.yml
  workflow_dispatch:

jobs:
  check:
    name: Validate baked tools in image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          path: builder
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: builder
          file: builder/Dockerfile.dockerfile
          tags: agent-code-server:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify baked commands exist
        run: |
          failures=0
          for cmd in code-server node npm bun docker dockerd fixuid gosu dumb-init git curl jq python3 pip tmux; do
            result=$(docker run --rm --entrypoint /bin/bash agent-code-server:test -c "command -v ${cmd}" 2>&1) || true
            if [ -n "${result}" ]; then
              echo "OK: ${cmd} found at ${result}"
            else
              echo "FAIL: ${cmd} not found"
              docker run --rm --entrypoint /bin/bash agent-code-server:test -c "which ${cmd} 2>&1 || echo 'not found'" 2>&1 || true
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} command(s) missing from image"
            exit 1
          fi
          echo "OK: all baked commands found"

      - name: Verify baked tool versions
        run: |
          failures=0
          for cmd in code-server node npm bun docker dockerd git python3 tmux; do
            echo "=== ${cmd} --version ==="
            version=$(docker run --rm --entrypoint /bin/bash agent-code-server:test -c "if [ \"${cmd}\" = tmux ]; then tmux -V; else ${cmd} --version; fi 2>&1" || echo "VERSION CHECK FAILED")
            echo "${version}"
            if echo "${version}" | grep -q "VERSION CHECK FAILED"; then
              echo "FAIL: ${cmd} --version failed"
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} version check(s) failed"
            exit 1
          fi
          echo "OK: all version checks passed"

      - name: Verify omp is not baked into image
        run: |
          if docker run --rm --entrypoint /bin/bash agent-code-server:test -c 'command -v omp >/dev/null 2>&1'; then
            echo "FAIL: omp is still baked into the image"
            exit 1
          fi
          echo "OK: omp is not baked into the image"

      - name: Verify PATH in fresh shell
        run: |
          expected_paths="/home/coder/.bun/bin /home/coder/.npm-global/bin /home/coder/.local/bin /home/coder/.local/go/bin /home/coder/.go/bin /home/coder/.cargo/bin /home/coder/.local/pip/bin"

          shell_path=$(docker run --rm --entrypoint /bin/bash agent-code-server:test -i -c 'echo "$PATH"' 2>&1)
          echo "Fresh shell PATH: ${shell_path}"

          failures=0
          for dir in ${expected_paths}; do
            if echo "${shell_path}" | tr ':' '\n' | grep -qFx "${dir}"; then
              echo "OK: PATH contains ${dir}"
            else
              echo "FAIL: PATH missing ${dir}"
              failures=$((failures + 1))
            fi
          done

          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} path(s) missing from fresh shell PATH"
            exit 1
          fi
          echo "OK: all managed directories in fresh shell PATH"

      - name: Verify coder fresh shell (simulates real terminal)
        run: |
          echo "=== Coder shell: id / HOME / PATH / bun / node / npm / tmux ==="
          failures=0
          result=$(docker run --rm --entrypoint /bin/bash agent-code-server:test -c '
            gosu coder bash -ilc '\''
              echo "ID: $(id)"
              echo "HOME: ${HOME}"
              echo "PATH: ${PATH}"
              echo "---"
              for cmd in bun node npm tmux; do
                loc=$(command -v "${cmd}" 2>&1) || loc="NOT_FOUND"
                echo "command -v ${cmd}: ${loc}"
                ver=$(if [ "${cmd}" = tmux ]; then tmux -V 2>&1; else "${cmd}" --version 2>&1; fi) || ver="FAILED($?)"
                echo "${cmd} --version: ${ver}"
                echo "---"
              done
            '\'' 2>&1
          ')
          echo "${result}"

          # Check user info
          if ! echo "${result}" | grep -q "uid=1000(coder)"; then
            echo "FAIL: expected user coder (uid=1000)"
            failures=$((failures + 1))
          fi
          if ! echo "${result}" | grep -q "HOME: /home/coder"; then
            echo "FAIL: expected HOME=/home/coder"
            failures=$((failures + 1))
          fi

          # Check PATH entries
          for dir in \
            /home/coder/.bun/bin \
            /home/coder/.npm-global/bin \
            /home/coder/.local/bin \
            /home/coder/.local/go/bin \
            /home/coder/.go/bin \
            /home/coder/.cargo/bin \
            /home/coder/.local/pip/bin
          do
            if echo "${result}" | grep -qE "PATH:.*${dir}(:|$)"; then
              echo "OK: PATH contains ${dir}"
            else
              echo "FAIL: PATH missing ${dir}"
              failures=$((failures + 1))
            fi
          done

          # Check commands found
          for cmd in bun node npm tmux; do
            loc=$(echo "${result}" | grep -E "^command -v ${cmd}:" | head -1)
            if echo "${loc}" | grep -qv "NOT_FOUND"; then
              echo "OK: ${cmd} found in coder shell"
            else
              echo "FAIL: ${cmd} not found in coder shell"
              failures=$((failures + 1))
            fi
          done

          # Check for "env: bun: No such file or directory"
          if echo "${result}" | grep -qi "No such file or directory\|env.*bun"; then
            echo "FAIL: bun errors detected in coder shell output"
            failures=$((failures + 1))
          fi

          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} coder shell check(s) failed"
            exit 1
          fi
          echo "OK: coder fresh shell validates"

      - name: Verify entrypoint does not exit immediately (no volumes)
        run: |
          echo "=== Entrypoint startup check ==="
          container_id=$(docker run -d --rm agent-code-server:test 2>&1) || {
            echo "Container failed to start (expected without volumes)"
            echo "OK: quick-start not required"
            exit 0
          }
          sleep 5
          status=$(docker inspect --format '{{.State.Status}}' "${container_id}" 2>/dev/null || echo "gone")
          docker logs "${container_id}" 2>&1 | tail -5 || true
          docker stop "${container_id}" 2>/dev/null || true
          echo "Container status after 5s: ${status}"
          if [ "${status}" = "running" ]; then
            echo "OK: container starts without volumes"
          else
            echo "Container exits without volumes (expected — entrypoint needs /home/coder)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Baked Tools Check" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Image: agent-code-server:test" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          docker images --filter=reference='agent-code-server:test' --format '{{.CreatedAt}}' | head -1 | while read -r created; do
            echo "Built: ${created}" >> "${GITHUB_STEP_SUMMARY}"
          done
