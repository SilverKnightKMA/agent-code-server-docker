name: Build Image

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - scripts/code-server-entrypoint.sh
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-tools-config.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - .tmux.conf
      - managed-tools/baked-tools.json
      - .github/workflows/build-image.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - scripts/code-server-entrypoint.sh
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-tools-config.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - .tmux.conf
      - managed-tools/baked-tools.json
      - .github/workflows/build-image.yml
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-code-server

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v7
        with:
          path: builder
          fetch-depth: 1

      - name: Resolve builder scope fingerprint
        id: builder_scope
        working-directory: builder
        run: |
          files=(
            Dockerfile.dockerfile
            package.json
            package-lock.json
            go.mod
            go.sum
            tools.go
            scripts/code-server-entrypoint.sh
            scripts/managed-npm-tools.mjs
            scripts/managed-go-tools.mjs
            scripts/managed-mounted-tools.mjs
            scripts/managed-tools-config.mjs
            scripts/managed-tools-output.mjs
            scripts/managed-tools-status.mjs
            .tmux.conf
            managed-tools/manifest.json
            managed-tools/policy.json
            .github/workflows/build-image.yml
          )

          for file in "${files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing builder scope file: ${file}" >&2
              exit 1
            fi
          done

          builder_scope_sha="$({ for file in "${files[@]}"; do sha256sum "${file}"; done; } | sha256sum | cut -d' ' -f1)"
          builder_scope_short_sha="$(printf '%s' "${builder_scope_sha}" | cut -c1-12)"

          {
            echo "builder_scope_sha=${builder_scope_sha}"
            echo "builder_scope_short_sha=${builder_scope_short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="b${{ steps.builder_scope.outputs.builder_scope_short_sha }}"
          {
            echo "version_tag=${VERSION_TAG}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION_TAG}"
            echo "check_tag=${IMAGE}:${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists
        if: github.event_name != 'pull_request'
        id: existing
        run: |
          if docker manifest inspect "${{ steps.tags.outputs.check_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image tag already exists: ${{ steps.tags.outputs.check_tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request' || steps.existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build image
        if: github.event_name == 'pull_request' || steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: builder
          file: builder/Dockerfile.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Docker image with code-server + AI coding agents (omp, pi, and more)
            io.agent-code-server.builder-scope-sha=${{ steps.builder_scope.outputs.builder_scope_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "## Build validated" >> "$GITHUB_STEP_SUMMARY"
            echo "PR validation built image without pushing." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            echo "## Build skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.tags.outputs.check_tag }} already exists." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Build complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Pushed: ${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Builder scope: \`${{ steps.builder_scope.outputs.builder_scope_short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
