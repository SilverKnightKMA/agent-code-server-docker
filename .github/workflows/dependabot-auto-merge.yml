name: Dependabot Auto-Merge

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ github.token }}"

      - name: Log update details
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: |
          echo "Dependency: ${DEPENDENCY_NAMES}"
          echo "Ecosystem: ${PACKAGE_ECOSYSTEM}"
          echo "Update type: ${UPDATE_TYPE}"
          echo "Dependency type: ${DEPENDENCY_TYPE}"

      - name: Evaluate auto-merge policy
        id: policy
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          allow_automerge=false
          reason=""

          case "${UPDATE_TYPE}" in
            version-update:semver-patch|version-update:semver-minor)
              allow_automerge=true
              reason="auto-merge candidate: ${UPDATE_TYPE}"
              ;;
            version-update:semver-major)
              allow_automerge=false
              reason="major update requires manual review: ${UPDATE_TYPE}"
              ;;
            *)
              allow_automerge=false
              reason="unknown update type: ${UPDATE_TYPE}"
              ;;
          esac

          {
            echo "allow_automerge=${allow_automerge}"
            echo "reason=${reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check changed files
        id: files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files_safe=true
          protected_paths="managed-tools/manifest.json managed-tools/policy.json managed-tools/"

          changed=$(gh pr view "${PR_NUMBER}" --json files --jq '.files[].path' 2>/dev/null || echo "")

          if [ -z "${changed}" ]; then
            echo "Could not list changed files; manual review required"
            echo "files_safe=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Changed files:"
          echo "${changed}"

          while IFS= read -r filepath; do
            for pattern in ${protected_paths}; do
              case "${filepath}" in
                ${pattern}*)
                  echo "Protected file changed: ${filepath} (matches ${pattern})"
                  files_safe=false
                  ;;
              esac
            done
          done <<< "${changed}"

          if [ "${files_safe}" = "false" ]; then
            echo "Managed-tools files changed; manual review required"
          fi

          echo "files_safe=${files_safe}" >> "${GITHUB_OUTPUT}"

      - name: Skip auto-merge
        if: steps.policy.outputs.allow_automerge != 'true' || steps.files.outputs.files_safe != 'true'
        run: |
          echo "Not enabling auto-merge."
          echo "Update-type allowed: ${{ steps.policy.outputs.allow_automerge }} (${{ steps.policy.outputs.reason }})"
          echo "Changed-files safe: ${{ steps.files.outputs.files_safe }}"

      - name: Enable native GitHub auto-merge
        if: steps.policy.outputs.allow_automerge == 'true' && steps.files.outputs.files_safe == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "${PR_URL}" --auto --squash
