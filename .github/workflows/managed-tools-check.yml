name: Managed Tools Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-paseo-skills.mjs
      - scripts/managed-pi-extensions.mjs
      - scripts/managed-tools-config.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - scripts/validate-managed-tools.mjs
      - managed-tools/manifest.json
      - managed-tools/policy.json
      - .github/workflows/managed-tools-check.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-paseo-skills.mjs
      - scripts/managed-pi-extensions.mjs
      - scripts/managed-tools-config.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - scripts/validate-managed-tools.mjs
      - managed-tools/manifest.json
      - managed-tools/policy.json
      - .github/workflows/managed-tools-check.yml
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  check:
    name: Install & verify managed tools
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: builder

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v7
        with:
          path: builder
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            curl \
            ca-certificates \
            git \
            xz-utils \
            unzip \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: builder/package-lock.json

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Create clean home directories
        run: |
          TEST_HOME="${HOME}/managed-tools-test"
          rm -rf "${TEST_HOME}"
          mkdir -p \
            "${TEST_HOME}/.npm-global" \
            "${TEST_HOME}/.local/bin" \
            "${TEST_HOME}/.local/go" \
            "${TEST_HOME}/.go/bin" \
            "${TEST_HOME}/.cargo/bin" \
            "${TEST_HOME}/.omp/agent" \
            "${TEST_HOME}/.pi/agent" \
            "${TEST_HOME}/.codex" \
            "${TEST_HOME}/.config/opencode" \
            "${TEST_HOME}/.factory" \
            "${TEST_HOME}/.copilot" \
            "${TEST_HOME}/.rustup" \
            "${TEST_HOME}/.npm" \
            "${TEST_HOME}/.cache"

          {
            echo "TEST_HOME=${TEST_HOME}"
            echo "HOME=${TEST_HOME}"
            echo "NPM_CONFIG_CACHE=${TEST_HOME}/.npm"
            echo "MANAGED_NPM_PREFIX=${TEST_HOME}/.npm-global"
            echo "NPM_CONFIG_PREFIX=${TEST_HOME}/.npm-global"
            echo "MANAGED_RELEASE_BIN_DIR=${TEST_HOME}/.local/bin"
            echo "MANAGED_GO_ROOT=${TEST_HOME}/.local/go"
            echo "GOPATH=${TEST_HOME}/.go"
            echo "GOBIN=${TEST_HOME}/.go/bin"
            echo "CARGO_HOME=${TEST_HOME}/.cargo"
            echo "MANAGED_CARGO_HOME=${TEST_HOME}/.cargo"
            echo "RUSTUP_HOME=${TEST_HOME}/.rustup"
            echo "MANAGED_RUSTUP_HOME=${TEST_HOME}/.rustup"
            echo "PATH=${TEST_HOME}/.npm-global/bin:${TEST_HOME}/.local/go/bin:${TEST_HOME}/.go/bin:${TEST_HOME}/.cargo/bin:${TEST_HOME}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            echo "PI_CODING_AGENT_DIR=${TEST_HOME}/.omp/agent"
            echo "CLAUDE_CONFIG_DIR=${TEST_HOME}/.claude"
          } >> "$GITHUB_ENV"

          # Test THIS branch/PR's manifest.json + policy.json, not main's
          # published copy — otherwise "auto" mode's online fetch always
          # validates production's current config, never the change under
          # review, while still exercising the real online-fetch code path
          # (so the existing "must be online" / "forbid source=baked"
          # checks below stay meaningful).
          echo "AGENT_CODE_SERVER_MANAGED_TOOLS_BASE_URL=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}/managed-tools" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check config source (must be online)
        run: |
          echo "=== managed-tools:status (pre-init) ==="
          output=$(npm run --silent managed-tools:status 2>&1 || true)
          echo "$output"

          if ! echo "$output" | grep -q "source=online"; then
            echo "FAIL: config source is not online"
            echo "$output" | grep "\[config\]" || echo "(none)"
            exit 1
          fi

          if echo "$output" | grep -q "fallback=baked\|fallback=cache\|fallback=yes"; then
            echo "FAIL: config used fallback path"
            echo "$output" | grep "fallback="
            exit 1
          fi

          echo "OK: config source=online, no fallback"

      - name: Check for unresolved templates in URLs
        run: |
          output=$(npm run --silent managed-tools:status 2>&1 || true)
          if echo "$output" | grep -q '{version}'; then
            echo "FAIL: unresolved template {version}:"
            echo "$output" | grep '{version}'
            exit 1
          fi
          echo "OK: no unresolved templates"

      - name: Install all managed tools (capture log)
        run: |
          echo "=== managed-tools:init ==="
          INIT_LOG="${HOME}/managed-tools-init.log"
          npm run --silent managed-tools:init 2>&1 | tee "${INIT_LOG}"
          exit_code=$?
          echo "INIT_LOG=${INIT_LOG}" >> "${GITHUB_ENV}"
          if [ $exit_code -ne 0 ]; then
            echo "FAIL: managed-tools:init exited with code $exit_code"
            exit $exit_code
          fi
          echo "OK: all tools installed"
        timeout-minutes: 30

      - name: Audit init log for compliance
        run: |
          LOG="${INIT_LOG:?}"
          if [ ! -f "${LOG}" ]; then
            echo "FAIL: init log not found at ${LOG}"
            exit 1
          fi

          failures=0

          echo "--- Checking forbidden patterns ---"

          if grep -q 'api.github.com/repos' "${LOG}"; then
            echo "FAIL: init triggered GitHub API calls:"
            grep 'api.github.com/repos' "${LOG}"
            failures=$((failures + 1))
          else
            echo "OK: no GitHub API calls"
          fi

          for pattern in 'source=baked' 'fallback=yes' 'fallback=baked' 'fallback=cache'; do
            if grep -q "${pattern}" "${LOG}"; then
              echo "FAIL: init log contains forbidden '${pattern}':"
              grep "${pattern}" "${LOG}"
              failures=$((failures + 1))
            else
              echo "OK: no '${pattern}' in log"
            fi
          done

          if grep -q '{version}' "${LOG}"; then
            echo "FAIL: init log contains literal '{version}':"
            grep '{version}' "${LOG}"
            failures=$((failures + 1))
          else
            echo "OK: no literal {version} in log"
          fi

          for pattern in 'checksum verification skipped' 'checksum_asset missing' 'rate limit exceeded' 'rate.limit'; do
            if grep -q "${pattern}" "${LOG}"; then
              echo "FAIL: init log contains '${pattern}':"
              grep "${pattern}" "${LOG}"
              failures=$((failures + 1))
            else
              echo "OK: no '${pattern}' in log"
            fi
          done

          echo ""
          echo "--- Checking required checksum verification lines ---"

          for tool in gh yq ripgrep actionlint hadolint rustup; do
            if grep -q "\[verify\].*tool=${tool}" "${LOG}"; then
              echo "OK: checksum verification found for ${tool}"
            else
              echo "FAIL: no checksum verification for ${tool}"
              failures=$((failures + 1))
            fi
          done

          echo ""
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} compliance check(s) failed"
            exit 1
          fi
          echo "OK: all compliance checks passed"

      - name: Verify all tools are installed (state=equal)
        run: |
          echo "=== managed-tools:status (post-init) ==="
          output=$(npm run --silent managed-tools:status 2>&1)
          echo "$output"

          failures=0

          required_tools="pyright eslint prettier typescript typescript-language-server yaml-language-server bash-language-server omp pi opencode claude codex droid copilot paseo-skills pi-mcp-adapter go gopls shfmt gh yq ripgrep actionlint hadolint rustc cargo"
          
          paseo_status=$(echo "$output" | grep -E '^status.* tool=paseo-skills( |$)')
          if [ -z "$paseo_status" ]; then
            echo "FAIL: no status line for paseo-skills"
            failures=$((failures + 1))
          elif ! echo "$paseo_status" | grep -q 'state=equal'; then
            echo "FAIL: paseo-skills state is not equal"
            echo "  ${paseo_status}"
            failures=$((failures + 1))
          fi
          
          paseo_skill_names="paseo paseo-advisor paseo-committee paseo-handoff paseo-loop release-beta release-stable"
          for dir in \
            "${HOME}/.omp/agent/skills" \
            "${HOME}/.pi/agent/skills" \
            "${HOME}/.claude/skills" \
            "${HOME}/.codex/skills" \
            "${HOME}/.config/opencode/skills" \
            "${HOME}/.factory/skills" \
            "${HOME}/.copilot/skills"
          do
            if [ ! -d "$dir" ]; then
              echo "FAIL: missing Paseo skill dir $dir"
              failures=$((failures + 1))
              continue
            fi
            for skill in $paseo_skill_names; do
              if [ ! -f "$dir/$skill/SKILL.md" ]; then
                echo "FAIL: missing $skill/SKILL.md in $dir"
                failures=$((failures + 1))
              fi
            done
          done

          for tool in $required_tools; do
            status_line=$(echo "$output" | grep -E "^status.* tool=${tool}( |$)")
            if [ -z "$status_line" ]; then
              echo "FAIL: no status line for ${tool}"
              failures=$((failures + 1))
              continue
            fi
            if ! echo "$status_line" | grep -q "state=equal"; then
              echo "FAIL: ${tool} state is not equal"
              echo "  ${status_line}"
              failures=$((failures + 1))
            fi
          done

          missing_total=$(echo "$output" | grep -c "state=missing" 2>/dev/null || echo 0)
          action_total=$(echo "$output" | grep -c "action=install" 2>/dev/null || echo 0)
          if [ "${missing_total}" -gt 0 ] || [ "${action_total}" -gt 0 ]; then
            echo "FAIL: ${missing_total} missing, ${action_total} need action"
            failures=$((failures + 1))
          fi

          if echo "$output" | grep -q '{version}'; then
            echo "FAIL: unresolved template {version} in output"
            failures=$((failures + 1))
          fi

          if ! echo "$output" | grep -q "source=online"; then
            echo "FAIL: config source is not online after init"
            failures=$((failures + 1))
          fi

          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} verification(s) failed"
            exit 1
          fi

          echo "OK: all tools verified state=equal"

      - name: Verify agent CLI binaries actually run
        run: |
          # npm list state=equal only proves npm recorded the package as
          # installed — it does NOT prove the binary works. Native-binary CLIs
          # (installed with --ignore-scripts) can report state=equal while
          # still being broken at runtime if their postinstall (which selects/
          # unpacks the platform-specific binary) was skipped. Run each one.
          failures=0
          for cmd in omp pi opencode claude codex droid copilot; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              echo "FAIL: ${cmd} not found on PATH"
              failures=$((failures + 1))
              continue
            fi
            if version_output=$("${cmd}" --version 2>&1); then
              echo "OK: ${cmd} --version -> ${version_output}"
            else
              echo "FAIL: ${cmd} --version failed:"
              echo "${version_output}"
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} agent CLI binary check(s) failed"
            exit 1
          fi
          echo "OK: all agent CLI binaries run"

      - name: Summary
        if: always()
        run: |
          echo "## Managed Tools Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for dir in "${HOME}/.npm-global/bin" "${HOME}/.local/bin" "${HOME}/.local/go/bin" "${HOME}/.go/bin" "${HOME}/.cargo/bin"; do
            if [ -d "$dir" ]; then
              count=$(ls "$dir" 2>/dev/null | wc -l)
              echo "- \`$dir\`: ${count} entries" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
