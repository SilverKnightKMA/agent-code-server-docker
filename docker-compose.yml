services:
  code-server-omp:
    image: ghcr.io/silverknightkma/code-server-omp:latest
    container_name: code-server-omp
    init: true
    mem_limit: 8g
    ports:
      - "8880:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCKER_USER: "${USER:-coder}"
      CODE_SERVER_OMP_CONFIG_SOURCE: auto
      CODE_SERVER_OMP_CONFIG_CACHE_DIR: /home/coder/.local/state/code-server-omp/config
      CODE_SERVER_OMP_TMPDIR: /home/coder/.local/state/code-server-omp/tmp
      # CODE_SERVER_OMP_AUTOINSTALL: "true"
      # UI_PASSWORD: change-me

      # Docker-in-Docker. If enabled, also uncomment:
      #   user: root
      #   privileged: true
      #   security_opt no-new-privileges:false
      #   /var/lib/docker and /var/lib/containerd volume mounts
      # ENABLE_DIND: "true"

    restart: unless-stopped
    volumes:
      # Workspace
      - ./data/workspaces:/home/coder/workspaces

      # Auth & identity
      - ./data/ssh:/home/coder/.ssh
      - ./data/config/git:/home/coder/.config/git
      - ./data/config/gh:/home/coder/.config/gh

      # Managed/custom mounted tools
      - ./data/npm-global:/home/coder/.npm-global
      - ./data/bun:/home/coder/.bun
      - ./data/local-bin:/home/coder/.local/bin
      - ./data/local-go:/home/coder/.local/go
      - ./data/local-pip:/home/coder/.local/pip
      - ./data/cargo:/home/coder/.cargo
      - ./data/rustup:/home/coder/.rustup
      - ./data/go:/home/coder/.go

      # Managed cache
      - ./data/code-server-omp-cache:/home/coder/.local/state/code-server-omp

      # Optional startup scripts
      # - ./data/entrypoint.d:/home/coder/entrypoint.d

      # Optional Docker-in-Docker state. Uncomment only with ENABLE_DIND=true.
      # - ./data/docker:/var/lib/docker
      # - ./data/containerd:/var/lib/containerd

    # Optional Docker-in-Docker runtime privileges. Uncomment only with ENABLE_DIND=true.
    # user: root
    # privileged: true
    # security_opt:
    #   - no-new-privileges:false

networks: {}
