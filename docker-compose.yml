services:
  agent-code-server:
    image: ghcr.io/silverknightkma/agent-code-server:latest
    container_name: agent-code-server
    init: true
    mem_limit: 8g
    ports:
      - "8880:8080"
      - "6767:6767"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCKER_USER: "${USER:-coder}"
      AGENT_CODE_SERVER_CONFIG_SOURCE: auto
      AGENT_CODE_SERVER_CONFIG_CACHE_DIR: /home/coder/.local/state/agent-code-server/config
      NPM_CONFIG_CACHE: /home/coder/.npm
      AGENT_CODE_SERVER_TMPDIR: /home/coder/.local/state/agent-code-server/tmp
      # AGENT_CODE_SERVER_AUTOINSTALL: "true"  # install managed tools (including omp) on startup
      # UI_PASSWORD: change-me
      # SUDO_PASSWORD: change-me

      # Paseo (agent orchestration daemon + web UI, baked in alongside code-server)
      # PASEO_PASSWORD: change-me
      # PASEO_HOSTNAMES: paseo.example.com
      # ANTHROPIC_API_KEY: change-me
      # OPENAI_API_KEY: change-me

      # Docker-in-Docker. Uncomment these blocks to enable:
      # ENABLE_DIND: "true"
      # (also uncomment privileged, security_opt, and /var/lib/docker volumes below)

    restart: unless-stopped
    volumes:
      # === Workspace ===
      - ./data/workspaces:/home/coder/workspaces

      # === Auth & identity ===
      - ./data/ssh:/home/coder/.ssh
      - ./data/config/git:/home/coder/.config/git
      - ./data/config/gh:/home/coder/.config/gh

      # === Dedicated code-server state ===
      - ./data/config/code-server:/home/coder/.config/code-server
      - ./data/code-server-data:/home/coder/.local/share/code-server
      - ./data/code-server-cache:/home/coder/.cache/code-server

      # === Managed / custom mounted tools (Tier 2 + 3) ===
      - ./data/npm-global:/home/coder/.npm-global
      - ./data/bun:/home/coder/.bun
      - ./data/local-bin:/home/coder/.local/bin
      - ./data/local-go:/home/coder/.local/go
      - ./data/local-pip:/home/coder/.local/pip
      - ./data/cargo:/home/coder/.cargo
      - ./data/rustup:/home/coder/.rustup
      - ./data/go:/home/coder/.go

      # === Managed runtime state ===
      - ./data/agent-code-server-cache:/home/coder/.local/state/agent-code-server

      # === Paseo daemon state + agent credentials ===
      # Each agent CLI keeps its own config/credentials dir; check upstream
      # source before assuming a new agent follows one of these conventions.
      - ./data/paseo:/home/coder/.paseo
      - ./data/config/claude:/home/coder/.claude
      - ./data/config/codex:/home/coder/.codex
      - ./data/pi:/home/coder/.pi
      - ./data/omp:/home/coder/.omp
      - ./data/factory:/home/coder/.factory
      - ./data/opencode:/home/coder/.local/share/opencode

      # === Optional tmux persistence (uncomment when AGENT_CODE_SERVER_TMUX_PERSIST=true) ===
      # - ./data/tmux-state:/home/coder/.local/state/tmux

      # === Optional startup scripts ===
      # - ./data/entrypoint.d:/home/coder/entrypoint.d

      # === Optional Docker-in-Docker state (uncomment with ENABLE_DIND=true) ===
      # - ./data/docker:/var/lib/docker
      # - ./data/containerd:/var/lib/containerd

    # === Optional Docker-in-Docker runtime (uncomment with ENABLE_DIND=true) ===
    # privileged: true
    # security_opt:
    #   - no-new-privileges:false

networks: {}
